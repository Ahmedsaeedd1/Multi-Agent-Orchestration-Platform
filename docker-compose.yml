# Compose specification v2+ (version field is deprecated in modern Docker Compose)

services:
  # ==========================================
  # Short-Term Memory & Caching Layer
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: multi_agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --appendonly yes --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - multi_agent_net

  # ==========================================
  # Long-Term Semantic Memory & Cache Layer 2
  # ==========================================
  qdrant:
    image: qdrant/qdrant:v1.13.0  # Pinned to specific version for reproducibility
    container_name: multi_agent_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API (optional, but good to have)
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q 'healthz check passed'"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - multi_agent_net

  # ==========================================
  # SQL Assistant — relational data store
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: multi_agent_postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multi_agent_db}
      POSTGRES_USER: ${POSTGRES_USER:-multi_agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multi_agent_user} -d ${POSTGRES_DB:-multi_agent_db}"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - multi_agent_net

networks:
  multi_agent_net:
    driver: bridge

volumes:
  redis_data:
  qdrant_data:
  postgres_data: